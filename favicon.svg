<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#g)"/>
  <!-- Phone outline -->
  <rect x="20" y="8" width="24" height="42" rx="4" fill="none" stroke="#fff" stroke-width="2.5"/>
  <!-- Screen -->
  <rect x="23" y="14" width="18" height="28" rx="1.5" fill="rgba(255,255,255,0.25)"/>
  <!-- Home button -->
  <circle cx="32" cy="46" r="2" fill="rgba(255,255,255,0.6)"/>
  <!-- Dollar sign / POS indicator -->
  <text x="32" y="33" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="16" fill="#fff">$</text>
  <!-- Bottom bar -->
  <rect x="14" y="54" width="36" height="4" rx="2" fill="rgba(255,255,255,0.4)"/>
</svg>
